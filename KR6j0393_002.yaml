body:
  text: 龍樹菩薩於持明藏略出西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯復次讚歎三寶及諸賢聖讚佛曰我佛以大悲調伏諸衆生成福功德海是故我讚禮讚法曰真如之妙理能壞諸惡趣利生住寂靜是故我讚禮讚僧曰堅固持戒行證入解脫門住最功德剎是故我讚禮讚尊那菩薩及諸賢聖唵引洛乞叱彌三合攞乞叉二合拏禰尾引一薩哩嚩二合洛乞叉二合拏曼尼多引二奔拏也二合𤚥誐攞𤚥誐攞也二合三設囉拏惹誐多必哩二合野引四騷摩也二合蘇摩曩娑引禰嚩也二合一嚩囉引賀嚩囉那引必哩二合野引二鉢訥摩二合引娑曩引鉢訥摩二合目契引三尾摩攞引尾摩隸引乞叉二合拏四俱摩引哩引迦引稅引多引婆引娑引一烏那野引哩迦二合三摩鉢囉二合婆引二惹曩儞引誐哩惹二合儞鼻摩引三摩賀引彌引具引伽嚩哩沙二合尼引四阿彌多引阿蜜哩二合多引婆引娑引一阿惹囉引阿摩囉引度嚕二合嚩引二悉馱引悉馱引攞野引傲哩引三播引怛囉二合賀娑多二合引𡁠帝寅二合涅哩二合野引四捺舍波引囉彌多引鉢囉二合引鉢多一捺舍部引彌數僧悉體二合多引二底哩二合路迦惹曩儞引達儞也二合引三阿彌多引哩他二合鉢囉二合娑引達儞引四惹誐娑囉乞叉二合女捺喻二合訖多二合引一鉢囉野引訖哩二合鉢野引禰多引二誐引野底哩二合引薩哩嚩二合沒馱引喃引三娑引尾底哩二合左𡁠努囉娑引四怛囉二合引拏部引多引惹誐馱引底哩二合一莎哩誐二合摩引哩誐二合鉢囉二合捺哩沙二合喃二一蹉引嚕波摩賀引摩引野引三曩引曩引儞哩摩二合引拏嚕間尼引四鉢囉二合引帝賀引哩野二合摩護引娑引賀引一奔尼也二合三婆引囉三㪍哩二合多引二惡乞叉二合野引惡乞叉二合囉引戍儞也二合引三扇引多引建引多怛閉引悉體二合多引四𠆙切身引曩引賀引囉摩賀引薩埵引一薩埵引曩引必哩二合引底嚩娑攞引二建引多引囉多引囉尼引訥哩誐二合引三薩哩嚩二合商迦引鉢囉二合謨左儞引四惹演帝引惹引多吠引那引左一沒囉二合憾摩二合羯臘波二合摩努惹嚩引二散𠆙切身引迦引播引里儞引寫引摩引三摩曩娑引摩引曩細部多引四咱惹敢切虞梨曩引擬儞引虞呬也二合一蘇婆誐引必哩二合野捺哩沙二合曩引二達囉尼引馱引囉尼引尊那引三嚩儞也二合引底哩二合部引嚩儞引莎哩引四幡引波室祖二合引多引囉尼引布引瑟尼二合引一紇哩二合瑟致二合那引扇引底那引以儞引二達哩摩二合誐哩婆二合引母儞嚩囉引三儞引馱引沒提薩囉莎帝謨乞叉二合尼引四薩哩嚩二合薩埵引喃引一那引攞儞引薩哩嚩二合枳攞尾二合沙引二砌引那儞引婆嚩鉢舍引喃引三星賀沒囉二合多鉢吒沒哩二合多引四阿波囉引𡁠多引路迦羯哩引一薩哩嚩二合訥哩誐二合底儞嚩引囉尼引二騷引婆引誐也二合那引嚩虎部惹引三底哩二合路迦惹曩儞引室嚩引四訖哩二合瑟拏引二合𡁠曩嚩底引阿引哩也二合引一薩哩嚩二合摩引囉鉢囉二合摩哩那二合儞引二薩哩嚩二合沒提引鉢囉二合設娑多二合引野三三勃哩二合多引野虞尼引哩虞二合嚨四阿嚩路吉多僧倪也二合野一曩謨引𡫸切身怛也二合訖哩二合播引怛摩二合儞引二摩賀引嚩攞引野贊拏引野三尾彌也二合引囉引惹引野娑引達吠引四訥哩難二合引多那摩迦引夜引野五曩莫悉帝二合引嚩日囉二合播引拏曳引六復次行人如是讚三寶及本尊尊那菩薩已合掌志心發露懺悔云某甲自從無始已來至於今日輪回諸趣作大惡業行不善法自作教他見聞隨喜如是之業無量無邊對佛菩薩發露懺悔從今已去更不敢作願佛菩薩大慈大悲受我懺悔又復說言我某甲從今已後直至坐於菩提道場誓畢歸依正等正覺無上如來寂靜法界乃至歸依四方所有阿吠嚩哩底迦大菩薩衆乃至為佛菩薩捨於身命無所悔吝惟願慈悲攝受於我又復說言我某甲從今已去直至坐於菩提道場於蘊處界諸所有法一切無我無取無捨離一切相自性虛空本來平等亦復不生虛空之心唯如諸佛及諸菩薩發菩提心又如諸佛從初覺心知最上福謂以諸佛菩薩緣覺聲聞等乃至盡衆生界諸所有福悉皆隨喜我亦隨喜以此功德願我當來亦於一切衆生之界如佛大悲降大法雨種種方便於諸世間作大利益利樂衆生以勇猛心速於事業何以故此凡夫界是其難地而不究竟我於此界一切衆生願皆令得安樂寂靜出世間道已得道者我更令得最上功德阿耨多羅三藐三菩提行人如是讚歎懺悔隨喜回向發願已即結大印結已復結三昧印以二手作拳相並二中指如針二頭指外如金剛杵相二拇指安頭指側成印結此印誦大明曰唵引商羯哩引一摩賀引三摩曳引娑嚩二合引賀引二次結三摩地印以左手安臍輪右手安左手內二拇指與二頭指相著成印誦大明曰唵引尊一結三摩地印誦明已即入三摩地觀自心中如前出生一大蓮華衆寶所成於蓮華上有尊那菩薩具五分法身於彼身中出大光明其所出光隨所作法或白或黃或赤或黑隨現一色遍滿其身想彼光中出微妙字於微妙字出大光明其光變為金剛界行人自想己身與賢聖無異然後又觀鼻尖上有物專注其心作堅固慈微微出息正坐令頭頸腰微側低復於自心內觀有如來又觀如來心中現於日輪於日輪中現一開敷蓮華衆寶所成於蓮華中現尊那菩薩身如金色著白色衣種種莊嚴於尊那兩脅出大光明又想耳目口中出大熾焰作如是觀想得一一現前已使其分明無有錯謬然後收光頂禮奉上閼伽復誦佛眼菩薩大明七遍或二十一遍或作法時在曼拏羅內眠臥或得惡夢即誦佛眼菩薩大明八百遍當誦明時右手持珠左手執金剛杵大明曰唵引度曩嚩日囉二合郝一復次說加持數珠印以二手中指展舒以二頭指捏中指持以二拇指與二無名指小指持珠誦大明曰唵引阿訥部二合帝引一尾惹曳引二悉提引悉馱哩替二合引娑嚩二合引賀引三復以二手合掌安頂次安心上誦大明曰唵引曩謨引婆誐嚩底一悉提引二娑達野三娑引達野四悉馱二合引哩替二合引娑嚩二合引賀引五復次說造數珠法或用菩提子或硨磲玻瓈等當用一百八為數用童女合線以二十一條合成一條穿珠或持誦時以大拇指掐每掐一珠一誦大明其大明字亦有三種或用心月輪中大明字或用頂禮微妙字行人持誦時志心專注勿暫懈怠若作息災增益法時輕輕誦吽字及癹吒字若作調伏法亦用吽字及癹吒字唯起忿怒心厲聲持誦此為常則每作法持誦畢常誦佛眼大明而獻閼伽隨有所願至心祈求復作供養讚歎懺謝某甲上來供養絶無殊妙唯願菩薩布施歡喜又獻閼伽而作頂禮作法畢已發遣賢聖却用勾召印只以拇指而三搖動為發遣大明曰野引呬野引呬底一尾摩引曩引嚕棖二尾薩哩惹二合曳引三發遣賢聖已行人復作曼拏羅縛印擁護自身次作阿三𤚥擬儞印即以三昧印磔開拇指各如針左旋誦大明曰唵引紇哩二合引阿三𤚥擬儞吽引一癹吒半音復結三昧印亦作擁護復誦無能勝大明此明能成就一切事大明曰曩莫三滿多沒馱引喃一唵引二虎盧三贊拏引哩四摩燈擬娑嚩二合引賀引五結印誦明作擁護已而作頂禮行人當持誦畢起出道場唯得讀般若波羅蜜多經及造佛像佛塔及塗曼拏羅等餘即止息行人每於食時常用大明加持八遍然後可食加持食大明曰唵引嚩蘭捺禰引一帝引𡁠摩引里儞娑嚩二合引賀引二每食畢已餘食用大明加持已用獻不動尊明王大明曰曩莫三滿多一嚩日囉二合引𧹞怛囉二合吒半音二阿謨伽贊拏三嚕引沙拏娑怖二合引吒野四吽引怛囉二合吒半音㰠呼郎切𤚥引持誦行人作五藥淨水每一作半月為限日飲三兩以波羅舍葉為器飲水五藥者謂黃牛乳汁瞿母怛囉瞿摩耶酪吉祥草水合和成已即誦大明加持已然後方飲大明曰曩謨引婆誐嚩帝引一烏瑟膩二合引沙引野二唵引尾戍提引三尾囉𡁠引四始吠引五扇引底迦哩六娑嚩二合引賀引七行人以紅花染線用童女合以大明加持一千遍結七結已繫於腰側大明曰唵引賀囉一賀囉二滿提戍訖囉二合馱引哩尼三悉提引娑嚩二合引賀引四此明亦能禁伏戍訖囉及能破設咄嚕如是儀軌持誦行人可三時為限復次行人於瑜伽法門若欲修習求諸悉地者先於自身種種作法懺除宿業令無障難若不如此聖道難就又復行人欲作法時先須澄心離諸喧鬧於己身分想微妙字使諸字相一一現前若得現前一切罪垢皆得消滅微妙字者先於口門想其𤚥字於右肩上想暗字於左肩上想惡字於頭上復想暗字於右肩上想阿引字左臂上想嚩字於臍輪中想吽字復於遍身想阿引字如是微妙字皆是梵字復次行人每想如是字於身分現時即復誦大明曰吽引左隸祖隸引尊禰引吽引一此明若誦至一洛叉能除一切罪又誦大明曰唵引左隸祖隸尊禰引癹吒半音一此明若誦至一洛叉得大智慧又誦大明曰曩莫左隸引祖隸尊禰引曩莫此明常持能除一切塵垢復次說佛菩薩根本微妙字所謂牟字是妙吉祥菩薩根本昧字是慈氏菩薩根本室哩字為如來根本又為哩吠賢聖根本暗字為普賢菩薩根本惡字為虛空藏菩薩根本阿引字為一切如來根本勃𭍌字為大輪明王根本阿字又為觀自在菩薩根本又為金剛手菩薩根本吽字為焰鬘得迦忿怒明王根本唵字為毗盧遮那佛根本左字為大輪明王根本隸字為不動尊明王根本又為馬頭明王根本尊字為大尊那菩薩根本禰字為金剛薩埵菩薩根本莎字為伊迦惹吒根本賀引字為嚩日囉曩佉根本復次演說諸印所謂擇地印犁印方位印蓮華印三叉印鉢哩伽印羂索印鉤印搗杵印勃遜尼印寶杖印座印金剛座印及賢座印莎悉帝迦印惹嚩曩印師子座印說法輪印師子步印師子臥印幡印扇印白拂印金剛鈴真珠瓔珞印法鼓印吉祥子印螺印優鉢羅花鬘印經印忿怒寶印持世印迦牟迦印僧伽梨衣鉢印無畏印法輪印花印塗香印燈印食印請召本尊印發遣印供養印閼伽印衣服莊嚴印賢瓶印花鬘印神通印惹嚩曩舍印七彌盧印菩提樹印安三昧印除魔印頭頂器仗印定印佛眼印摩摩枳印惹羅播波尼印涅哩怛也鉢儞印怛羅輸達儞印淨㡧像印軍持印迦羅也拏印傘蓋印革屣印頂禮印沐浴印如是等八十四印於所求事能施成就復次說諸印相使諸行人修習圓滿得法成就行人欲作法時先須潔淨身心然後復用塗香塗其二手方可結於印契行人面東正立合掌安頂上頂禮三寶後頂禮本尊大尊那菩薩次頂禮觀自在菩薩次頂禮金剛手菩薩如是頂禮諸佛菩薩已方可結印經印以二手相合左手頭指中指直竪拇指無名指小指入右掌內以左手指相結成印此印於入三昧時及作成就法時用方位印先正立作右舞勢右轉以右手作施願左手作三幡相安額上復作右舞勢復作左舞勢成印此印能伏師子龍虎及部多必舍左鬼等乃至賊盜等次說法印二手合掌二拇指如針成印此印於供養本尊時用當得諸佛菩薩及天龍夜叉巘達哩嚩阿蘇囉誐嚕拏緊那囉摩護囉誐及諸持明天等皆悉歡喜能施成就次蓮華印以二手相合如八葉蓮華相令手指相離以二拇指入掌中成印結此印時能令大威德諸天皆悉歡喜能施行人大吉祥事所願成就次三叉印以左手作拳舒頭指中指無名指成印此印有大威力於作息災法時用次鉢哩伽印以二手各安臂上各竪頭指成印此印能除一切瘧病次羂索印以二手相並以無名指與拇指相鉤如鎖成印此印於敬愛法中作勾召有大功德次鉤印以左手拇指頭指無名指小指屈節如鉤成印此印亦於敬愛法中作勾召用次搗杵印以二手作拳相合以拇指相交成印此印當用息除大惡宿曜次勃遜尼印以二手相並復相顛倒為拳二頭指頭相並內入二拇指如一成印此印能息除宿曜及退一切惡鬼次誐那印以二手相並復顛倒各作拳復中指微屈入拇指內成印此印作調伏法中用能破壞設咄嚕及息除大惡宿曜夜叉等次鉢致娑印以右手拇指與小指安於頭指頭成印此印能降伏阿蘇囉次座印以右手屈無名指展舒餘指微屈拇指成印結此印時想成寶座獻諸賢聖次金剛座印以二手相並作拳復作如針縛以拇指入於針下成印結此印時想成金剛座奉獻佛世尊次賢座印先以左手平展安臍輪下以右手平展相倒安左手上成印此印作曼拏羅時及入定時用獻尊那菩薩及金剛手菩薩次莎悉帝迦印先在蓮華座上坐以右足越於左足復用右手磔開涅左手拇指成印此印於作成就法時用能與行人悉地次惹嚩曩印先正足立後却作右旋轉以二手各作拳舒中指作動搖成印此印若行人於大難中或被禁縛時用彼一切事無能為害次師子臥印先想蓮華上安坐作右顧視復却背坐後以右足越於左足以手觸地成印此印於作觀想時用次幡印以左手頭指與中指直竪作動搖成印此印作供養時用次幢印以右手作拳直竪中指成印此印鬪戰時或有大怖時用次師子座印先以二手相並復如合掌以中指與小指如針無名指頭指如環拇指直上而竪成印此印是世尊印為降伏大夜叉用次法印先作跏趺坐以左手作拳直竪拇指以右手執左手拇指安於臍輪成印此印求解脫用一切天人皆悉稱讚次八輻輪印以二手展舒手指各相離於頭上旋轉如輪相成印此印威力能斷除一切大惡次師子步印先正立如師子後以左手安背後復安右邊竪小指如針微屈二頭指展舒相著以拇指安頭指側成印此印於敬愛法中作勾召及發遣用次尊那菩薩諸根本印以諸印想在菩薩身分頂禮印先正立作合掌頂禮相成印此印是尊那頂禮為最上印次蓮華印不改前相合掌安尊那心即以兩足相顛倒成印此亦名最上印次頭印先翹左足後以右膝著地右手安額上作動搖復以四指相並以拇指安掌中成印次頂印以中指如針與右拇指相捻成印此印若以甲胄大明同用亦名甲胄印次尊那本印先以二手拇指動搖然以二手合掌以右拇指入掌內成印安於心上次花印以二手作拳復二手竪如針以頭指與拇指俱合成印次大印以二手相並指不相著以拇指安小指第三節後作堅固拳成印以此印安本心即誦大明七遍能作一切法次第二印即以前印竪二拇指展舒餘指各不相著成印次第三印以前印以頭指各安中指第三節成印第四印以二手指展舒復各屈中節復以中指無名指安拇指上復以中指無名指安中節成印次經印以左右手拇指各捏小指甲復右手指安左手上成印次螺印以二手頭指中指相著展舒小指捻拇指甲堅固成印次定印先跏趺坐以二手展舒以右手在左手上二拇指甲相著安臍輪下成印如是諸印相亦隨分演說修行行人虔心記憶習令精熟於作法時無令誤失若稍疑誤不成印契不成印契即賢聖不喜凡所祈求不獲成就
