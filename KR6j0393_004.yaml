body:
  text: 龍樹菩薩於持明藏略出西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯次又結如來部三昧印以二手作拳竪二拇指成印隨印誦前如來部三昧明作自擁護次結尊那菩薩根本印以二手作拳二中指如針二頭指安中指節二拇指安頭指側安頂上成印結此印時誦尊那菩薩根本大明而於自身作大擁護時行人於結印誦明時得尊那菩薩歡喜顧視次結頭印以二手作合掌二拇指入掌中成印隨印誦頭大明曰唵引尊紇哩二合引一次結頂印以前印改右手拇指捻中指中節成印隨印誦頂大明曰唵引尊吽一次結心印以二手作拳微舒二頭指成印隨印誦心大明曰唵引尊癹吒半音一次結甲胄印用前頂印復散手成印隨印誦甲胄大明曰唵引尊滿馱一次結本部母印亦名佛眼印以二手作合掌頂禮屈二頭指捻中指節二拇指入掌內成印隨印誦前甘露軍茶利大明次結本部尊印以二無名指入掌動搖次以二中指如針直舒二頭指安中指背舒二拇指安頭指第一節成印隨印誦本部尊大明曰曩莫三滿多一沒馱喃引二俱攞紇哩二合三俱攞紇哩二合那野四誦此明已取潔淨鉢滿盛香水復用甘露軍茶利大明加持七遍於道場東北隅起首四方灑淨及發遣魔障次結請召印用前根本印改二拇指屈如鉤成印以此印請召賢聖隨印誦請召大明曰伊呬婆誐嚩底一尊那引馱引囉尼二阿引誐蹉三阿引誐蹉四摩摩薄訖怛也二合五怛三摩曳引曩佐引哩伽二合六鉢囉二合帝引砌引難七鉢囉二合細引那彌引八誦此明已想諸賢聖隨召而至即誦甘露軍茶利大明安住賢聖已次結三昧印及誦大明獻賢聖座三昧印以右手拇指捏頭指甲餘指如金剛相成印隨印誦三昧大明曰唵引商羯哩引三摩曳引娑嚩二合引賀引一誦此明已行人即言惟願菩薩處此座已安住道場受我供養次誦本部大明七遍加持香水用為閼伽誦本部大明曰唵引左隸引一祖隸引二尊禰引三阿哩伽二合婆誐嚩底四鉢囉二合帝引蹉娑嚩二合引賀引五次結根本印密結二拇指平舒成印及誦大明三遍加持前閼伽水然後面東胡跪奉獻賢聖大明曰唵引迦摩攞娑嚩二合引賀引一獻閼伽已復用甘露軍茶利印及誦甘露軍茶利大明結金剛界而作擁護次結十方界以二手相並先用右手中指無名指及左手頭指安左手小指第一節却以左手中指無名指及右手頭指安右手小指第一節餘頭指小指如針復以拇指安頭指第一節成印結此印時隨印誦結十方金剛界大明曰囉怛曩二合嚩日囉二合曩底一唵引娑囉二娑囉三嚩日囉二合鉢囉二合迦囉吽引癹吒半音娑嚩二合引賀引四次結金剛半惹囉印即用前印磔開拇指成印隨印誦半惹囉大明曰囉怛曩二合嚩日囉二合曩底一唵引尾娑普二合囉二合二洛乞叉二合嚩日囉二合播引囉三吽引癹吒半音四次下方結界印用前印改二拇指直下如針成印隨印誦結下方界大明曰囉怛曩二合嚩日囉二合曩底一唵引枳哩二枳哩三嚩日囉二合嚩日哩四部晚達儞引五吽引癹吒半音六次結大烏瑟膩沙印以二手相並二無名指屈入掌二中指如針安二拇指第三節復以拇指無名指如針以小指捏第三節復以小指如針安頭指如金剛相成印隨印誦烏瑟膩沙大明曰唵引商羯哩引一摩賀引三摩曳引娑嚩二合引賀引二以如是等印及大明作結界已行人向於本尊賢聖恭敬作禮次結根本印以二手拇指屈中節成印結此印誦大明䠒跪獻閼伽用灌沐賢聖大明曰唵引左娑嚩二合引賀引一次結塗香印以右手拇指安頭指第一節復展舒成印結此印誦塗香大明曰唵引尊娑嚩二合引賀引一次結華印以右手拇指與頭指第一節相捻成印以此印獻華誦華大明曰唵引尊娑嚩二合引賀引一次結香印以右手中指與拇指相捻成印以此印獻燒香誦香大明曰唵引隸引娑嚩二合引賀引一次結燈印以左手拇指捏中指節成印結此印誦獻燈大明曰唵引禰引娑嚩二合引賀引一次結出生印以左手拇指安中指第一節成印結此印獻食誦獻食大明曰唵引祖娑嚩二合引賀引一如是結印誦明作種種供養奉獻曼拏羅中一切賢聖已復作觀想於一切世間見聞所有一切供具行人運心以此供養十方一切賢聖復結普供養印先合掌頂禮已復以二手指相交成印隨印誦普供養大明曰曩莫薩哩嚩二合沒馱一冒地薩埵引喃引二薩哩嚩二合他引三烏訥誐二合帝引娑婆二合囉呬𤚥四誐誐曩劍娑嚩二合引賀引五如是普供養已次以偈讚三寶及觀自在金剛手菩薩等讚佛曰我佛大慈悲調伏諸有情住福功德海是故我讚禮讚法曰離欲樂寂靜能斷諸惡趣純一真如理是故我讚禮讚僧曰堅固持尸羅證得解脫道住最功德剎是彼我讚禮讚諸賢聖曰怛鑁二合引禰引尾颯鉢多二合𠰒曩俱胝囉毗鉢囉二合瑜引誐引一捺也二合娑多二合捺也二合他引鉢那欲帝引曩左隸引祖隸曩二欲訖多摩試沙訥哩多鉢囉二合舍摩引野尊禰引三莎引賀引嚩帝引三摩囉底怛寫俱覩引尾鉢底四薩哩嚩二合沒馱曳二合鉢囉二合設娑多二合引野三勃哩二合引跢引野虞尼引哩虞二合嚕五阿嚩路吉多塞倪也二合野曩謨引𡫸切身怛也二合摩賀引怛摩二合儞引六摩賀引摩攞引野贊拏引野尾儞也二合引囉引惹引野娑引達吠引七訥哩難二合引多那摩迦引野室左二合曩摩悉帝二合引嚩日囉二合播引拏曳引八復次行人如是讚歎已復說懺悔云弟子某甲自從無始已來至於今日在輪回中造不善業或自作或教他乃至見聞隨喜一切不善今對三寶發露懺悔從今已去奉持禁戒更不復作又復今日已去所有諸大菩薩緣覺聲聞乃至一切衆生所作善法我悉隨喜作是說已即結根本印誦根本明三遍行人復合掌白言某甲上來所作供養多不周備或忘失次第不依法則惟願菩薩及衆賢聖大慈大悲布施歡喜次結閼伽印用前根本印改拇指安頭指第一節成印隨印誦閼伽大明曰唵左隸引一祖隸引二尊禰引三阿哩伽二合婆誐嚩底鉢囉二合帝引蹉娑嚩二合引賀引四復次行人觀想己身為尊那菩薩先結印以二手作金剛拳以二頭指與小指如針次舒餘指亦如針成印結此印時觀想己身成尊那菩薩於頭上現唵字為如來烏瑟膩沙次於兩眼現左字成烏瑟膩沙大輪次於頸上現隸字成不動尊明王手執螺及羂索次於心中現卒字成觀自在菩薩次於兩臂復現隸字成光積明王次於心中復現隸字成於賢聖面有三目手執蓮華羂索軍持等次於臍輪中復現卒字成本尊尊那菩薩次於兩股現禰字成金剛手菩薩次於兩腨現莎字成伊迦惹吒菩薩面有三目六臂身青色以象皮為衣次於兩足現賀字成嚩日囉曩契菩薩如玻瓈色如是觀想已次即持誦持誦之法亦有二種一無相二有相無相持誦者先結禪定印跏趺而坐端身澄心項頸微低於鼻尖上想出入息非麁非細不緩不急心緣大明專注持誦勿令間斷亦勿令心有所勞惓如是持誦名為最上有相持誦者即持珠定數每一持誦須及無數直至獲得悉地不得闕少一數若闕一數名為間斷於所求事不獲成就每欲持誦先結數珠印以無名指頭指屈中節與中指中節相捻成印隨印誦大明曰唵引遏訥部二合帝引一尾惹曳引二悉提引三悉馱引哩替二合引娑嚩二合引賀引四誦此明已即二手合掌捧珠誦大明七遍加持其珠大明曰唵引曩謨引婆誐嚩底一悉提引二娑引達野三娑達野四薩哩嚩二合引哩他二合娑引達儞五悉馱引哩替二合引娑嚩二合引賀引六誦此明已即持珠頂禮三賢聖然後依法持誦誦數滿足復誦佛眼大明七遍結根本印復誦佛眼明三遍獻賢聖閼伽又復白言我今盡此持誦奉獻菩薩又獻香華燈塗而作供養次復用佛眼大明而自擁護及結界次用阿三𤚥擬儞印護身五處阿三𤚥擬儞印以二手相並二無名指相顛倒入掌內二中指與小指如針復頭指如針安側二拇指直下復無名指入掌成印隨印誦阿三𤚥擬儞大明曰唵引阿三𤚥擬儞引尾引囉一捺曳帝引二吽引癹吒半音娑嚩二合引賀引三次結根本印及誦大明以為發遣印相如前大明曰誐蹉底一仡哩二合係怛吠二合引𤚥二巘唐補瑟半二合三度半末陵四鉢囉二合禰引半左五𠸪乞叉二合引鉢囉二合底賀多六嚩攞鉢囉引訖囉二合彌引娑嚩二合引賀引七如是發遣已復持數珠向心前作擁護又結甘露軍茶利印而自擁護已然後頂禮諸佛菩薩而起出於道場唯得讀誦大乘方廣華嚴及佛母般若波羅蜜多經或塗曼拏羅及造塔像不得談說世俗典籍此為恆式行人食時恆用尊那菩薩根本大明加持已然後可食或睡眠時亦誦根本大明作擁護已即可睡眠根本大明曰曩莫三滿多一沒馱引喃引二唵引嚩蘭那禰引三帝引𠰒踰二合摩引里儞娑嚩二合引賀引四復次宣說佛及賢聖微妙字觀想法此字皆是諸佛賢聖根本表真實理乃至無相持誦及息災等四種之法皆於尊那法中之所演說行人若作息災增益敬愛降伏等法於此諸法應須一一如儀了知今當略說微妙字於曼拏羅中安布九位次第之法第一於東北隅安唵字第二於東南隅安左字次隸字次卒字如是四隅安已次於中位安尊字次安隸字次安禰字次安莎字次安賀字此九字乃是根本大明成九賢聖復次唵字為無相法界左字為大輪隸字為不動尊卒字為觀自在又隸字為不空羂索菩薩尊字為尊那菩薩禰字為金剛手菩薩莎字為伊迦惹吒菩薩賀字為嚩日囉曩契菩薩如是等微妙字於一切大明若以唵字為首者能成就一切法若左字於息災增益降伏三法有大威力隸字能破壞設咄嚕亦作發遣及擁護法功力最大卒字能作破壞及散他軍如金翅鳥能食於龍隸字破諸大惡有最勝力尊字能成就一切事能破堅固禁嚩禰字能破魔怨及諸大惡亦能作入寤法莎字能自擁護及能破怨亦能令作鉢入寤法賀字能除大毒及一切病如是等字猶八正道能使有情解脫輪回後得寂滅復次行人觀想如是微妙字相於己身分一一現前或變色相或變形儀若得如是現前能滅身中一切罪業斷除煩惱初想唵字現於頭上作黃金色次想左字現於兩目亦作金色次想隸字現於頸上作深黑色次想卒字現於臍輪如紅蓮色或大青色其色所現隨彼作法次想隸字現於兩臂化賢聖像或作金色或作赤色次想尊字現於心上變成尊那菩薩身作白色想禰字現於兩股想莎字現於兩腨想賀字現於兩足想如是字於己身分一一現前得現前已斷諸煩惱滅一切罪乃至能使內心皎潔如塵覆像隨拂清淨精進諸天皆悉敬愛復次想微妙字變成本位賢聖觀字成尊那菩薩本身者身作白色面有三口有一十八臂熾焰遍身坐白蓮花而於身中能生諸佛若觀字成多羅菩薩者身大青色現忿怒相利牙外出象皮為衣一手執劍一手執髑髏滿中盛血若觀字成伊迦惹吒菩薩者右第一手執寶捧第二手執羂索左第一手執竭椿誐第二手執瀝血人頭若觀字成嚩日囉曩契者身色如月右二手執劍及鉞斧左二手執羂索及蓮花此嚩日囉曩契是馬頭明王所化有大威力若有被得叉迦龍所蠚者一切諸力無能救度唯嚩日囉曩契可為救濟若復行人處處用者皆得成就等如意寶一切隨心復次於諸大明加字所用各各成就法若加唵字能為警覺及作發遣若加唵隸吽三字力能斷截若加唵羅吽癹吒五字者力能驚怖及能破壞亦能擁護若加唵祖曩莫四字者能成就敬愛法若加唵祖吽三字者能退他軍若加唵隸癹吒四字者息大鬪戰若作息災法用此大明曰唵引尊阿母羯寫扇鼎俱嚕娑嚩二合賀引一若作增益法用此大明曰唵引尊阿母羯寫洛叉彌俱嚕娑嚩二合賀引一若作敬愛法用此大明曰唵尊曩莫一若為息大鬪戰用此大明曰唵尊禰吽癹吒又作息災法隨誦大明兼稱彼名說所求事大明曰左隸祖隸尊禰阿母羯寫扇鼎俱嚕娑嚩二合賀引一又作增益法隨誦大明兼稱彼名說所求事大明曰唵左隸祖隸尊禰娑嚩二合賀引一又作敬愛法隨誦大明兼稱彼名說所求事大明同增益法又作降伏法隨誦大明兼稱彼名說所為事大明曰曩莫左隸祖隸尊禰阿母羯嚩尸俱嚕娑嚩二合賀引一又作勾召法誦大明曰唵左隸祖隸尊禰阿母羯摩羯哩沙野紇哩二合一又驅逐怨家隨誦大明兼稱彼名說所為事大明曰唵左隸祖隸尊禰阿母羯母佐吒野吽引一又破壞魔怨法大明曰唵左隸祖隸尊禰阿母羯摩羅野吽癹吒半音一又作極破壞魔怨法大明曰唵左隸祖隸尊禰阿顛多摩羅尼娑嚩二合賀引一又作大息災法隨誦大明稱彼所成就事大明曰唵左隸祖隸尊禰娑嚩二合賀引一又作大敬愛法隨誦大明稱彼名字說所成就事大明曰曩莫左隸祖隸尊禰曩莫阿顛多嚩尸曳紇哩二合一又作大勾召法大明曰左隸祖隸尊禰紇哩二合一又作極壞大怨法隨誦大明兼稱彼名說所為事吽唵左隸祖隸尊禰吽阿顛覩左吒稱癹吒左隸祖隸尊儞癹吒半音一如是等大明各各隨所作法稱說其事無不成就諸佛所說大尊那教能滿一切衆生之願以頌讚曰尊那功德聚寂靜心常持一切諸大難無能侵是人天上及世間受福如佛等從茲如意寶定獲無等等
