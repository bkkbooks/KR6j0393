body:
  text: 大明成就分第一龍樹菩薩於持明藏略出西天譯經三藏朝散大夫試光祿卿明教大師臣法賢奉詔譯爾時世尊言此大毗盧遮那如來瑜伽大教若有善男子樂欲修習諸成就法者應於是教尊那菩薩大明法中一心專注精勤修習於所願求無不成就若有行人欲作最上殊勝成就者先於大海岸邊誦尊那菩薩根本大明造沙塔六洛叉得數滿已於所求事必獲成就復次若欲求見觀自在菩薩或多羅菩薩或金剛手菩薩等如前修習是諸菩薩必為現身安慰行人與滿所願乃至或作敬愛等法或求種種聖藥或求阿蘇囉王位或求持明天位如是之事必獲成就若久久修習專注不退乃至菩薩之位亦可獲得復次行人若於佛塔前或菩提道場所持誦大明一俱胝誦數滿已得阿羅漢現身與語獲大利益此後與阿羅漢同行亦同其威德又復行人往前正覺山頂於佛塔前常持鉢食誦大明一俱胝誦數滿已得見金剛手菩薩菩薩自引行人入吉祥門告行人言汝入此門無諸魔難所求願滿離一切怖受大快樂而於將來得見慈氏聞說妙法證菩薩地乃至或得阿吠嚩哩底迦菩薩之位又復行人或往尾補羅山頂一切潔淨常持鉢食於有舍利像前隨力備辦香花燈塗而作供養誦大明三洛叉至數滿已行人別備廣大供養行人倍加潔淨齊戒至十五日竟日連夜持誦不輟金剛手菩薩決定現身引接行人往自本宮及遊吉祥門令行人入得延壽命齊於日月又復行人往三道寶階佛塔之處常持鉢食右繞佛塔誦大明一俱胝誦數滿已得見無能勝及訶利帝等所求如意其訶利帝接引行人往自本宮與種種聖藥其無能勝現身為行人說法令證菩提道及授與聖藥變行人身具殊勝相及得一切菩薩接引證道乃至速坐菩提道場此尊那大明乃是一切如來及諸菩薩同所宣說能與衆生作大利益乃至獲得無上正等正覺復次若有衆生作大惡業無有善種於菩提心無由生起菩提分法永不獲得如是之人忽遇知識誦此大明一歷耳根重罪減劣善種即生何況行人恆常持誦專注精勤如是之人求成就者決定獲得觀智成就分第二之一復次行人若欲修習諸成就法者先須修習觀智及諸印相皆令精熟無使謬誤方可求諸悉地若於尊那菩薩法中求悉地者先觀尊那菩薩根本微妙字輪安自身分所謂觀唵字安頭上觀左字安兩目觀隸字安項頸觀卒字安兩臂復觀隸字安心上觀尊字安於臍中觀禰字安兩股觀莎字安兩腨行人觀此尊那根本微妙字相於己身分一一分明已是人先身所作一切罪業悉能除滅所求悉地決得成就或作息災增益敬愛調伏等法所誦大明各各差別作息災法所誦大明曰唵引左隸引一祖隸引二尊禰引莎引賀引三作增益法所誦大明曰唵引左隸引一祖隸引二尊禰引冒沙吒半三作敬愛法大明曰唵引左隸引一祖隸引二尊禰引曩莫三作調伏法大明曰唵引左隸引一祖隸引二尊禰引𠺁呬吽𠷑吒半音三若作如上四法必須請召本尊及衆賢聖作法竟却發遣句召大明曰唵引左隸引一祖隸引二尊禰引紇哩二合引三發遣大明曰唵引左隸引一祖隸引二尊禰引吽引三復次行人作曼拏羅時欲請本尊及句召壇中賢聖者先誦枳里枳里金剛大明而作潔淨大明曰唵引枳里枳里一嚩日囉二合吽引癹吒半音二誦此明作潔淨已行人觀想本尊尊那菩薩於色究竟天下降來入曼拏羅中又想曼拏羅中有師子之座蓮華普遍種種裝嚴即結獻座印及誦獻座明請菩薩坐已即結菩薩根本印及誦根本大明供養菩薩行人即言菩薩善來及獻閼伽等然後作法持誦又復行人依法作曼拏羅及結界灑淨已行人於曼拏羅前端坐正念作於觀想想前根本微妙字輪安諸身分初想一切如來在於頂上作此想時用結三昧印次想左字在於兩目當用佛眼印又想此字轉變成輪王有大力勢次想隸字作黑色在於項頸用結螺印即轉變成大忿怒不動尊明王手執劍及羂索次想卒字現於心上即變成佛身作赤色有四臂二手作合掌頂禮相二手作說法印降伏諸魔相復想隸字現於兩臂當用莎悉帝迦印一臂上變成不空羂索菩薩面有三目一臂上變成觀自在菩薩身作黃色次想尊字現於臍輪當用尊那本印變成本尊尊那菩薩若觀十八臂身作白色若觀六臂身作黃色若觀四臂身作赤色隨所觀相得現前已想此菩薩能於三界作大利益次想禰字現於兩股用吉祥印即變成佛及菩薩能成辦一切事次想莎字現於兩腨復用螺印劍印左腨上變成仡囉賀覲禰右腨上變成惹致儞次想賀字現於兩足用蓮華印即變成嚩日囉曩契明王手執羂索次用佛眼菩薩印及佛眼菩薩大明加持五處明曰唵引嚕嚕娑普二合囉一入嚩二合攞底瑟吒二合引二悉馱路左儞引三薩哩嚩二合引哩他二合娑引達儞娑嚩二合引賀引四復次行人作觀智已從座起立作合掌頂禮印及誦大明曰曩莫颯鉢多二合喃引一三藐訖三二合沒馱俱胝喃引二曩莫左隸引三尊禰引曩莫四此大明力能破衆魔無有魔及魔天敢違逆者次用發遣印發遣諸魔使於行人無諸難事發遣魔印以左手展舒作搖動令去勢右手作三昧金剛相安在腰右側以左足踏地作忿怒誦大明曰曩莫一阿左隸引二祖隸引三尊禰引四賀曩五那賀六摩他七尾特網二合薩踰娑引囉野多八吽引癹吒半音九次作結界印以二手於虛空十方上下旋動如風相成印即誦大明曰唵引左隸引一祖隸二尊禰引三達迦達迦四入嚩二合攞入嚩二合攞五薩哩嚩二合禰輸六滿馱滿馱七吽引八此明可於一切處用結界次用一切成就明加持塗香及淨水入曼拏羅灑淨已即結樓閣印以二手平仰相叉微屈舒二頭指二拇指附二頭指側成印結此印時想最上殊妙宮殿樓閣得現前已復想微妙字化成種種殊妙蓮華裝嚴師子之座作觀成已即誦請召大明請召本尊及衆賢聖入中處座隨以本部安為中座若以尊那為本部即以尊那為中座即觀想尊那菩薩一十八臂身白如秋月色著於白衣種種裝嚴以𤥭璖為腕釧十指皆有環裝嚴面有三目最上左右二手作說法相右第二手作施無畏相第三手持劍第四手執實鐸第五手執尾惹布囉果第六手執鉞斧第七手持鉤第八手執金剛杵第九手持數珠左第二手持如意寶幢第三手持蓮華第四手持軍尼第五手持羂索第六手持輪第七手持螺第八手持賢瓶第九手持般若波羅蜜多經於右邊安佛眼菩薩及衆賢聖左邊安金剛手菩薩觀自在菩薩諸餘菩薩及衆賢聖隨意安布已復用一切成就明及佛眼菩薩明加持閼伽及香花焚香奉上本尊及衆賢聖即白言菩薩及諸賢聖以我信心及依三昧力所奉上閼伽香花等唯願慈悲受我供養其閼伽水若作息災法用乳汁大麥同作若作增益法加脂麻若作調伏法加血及蕎麥同作閼伽所用盛閼伽器亦差別即說請召印以沐浴印改二拇指附頭指側如鉤相成印請召大明曰曩莫三貌訖三二合沒馱俱胝喃引一伊呬婆誐嚩底二一瑟吒二合引禰引嚩多引地瑟致二合帝引三唵引左隸引四祖隸引五尊禰引六𠺁𠺁娑嚩二合引賀引七誦此明已當誦獻座大明曰唵引迦摩攞娑嚩二合引賀引次說劍印亦為不動尊明王印以左手拇指無名指小指作拳舒頭指中指以右手頭指中指入左拳中餘指亦作拳成印不動尊大明曰曩莫三滿多嚩日囉二合引𧹞引一唵引阿左攞迦引㧝二贊噥女江反娑引達野吽引癹吒半音三次說三昧耶印以右手拇指捏小指甲餘指如金剛杵相成印結此印誦三昧耶大明曰唵引商羯哩引一三摩曳娑嚩二合引賀引二次獻閼伽印以沐浴印只改磔大拇指安頭指側作合掌相成印大明曰唵引左隸一祖隸二尊禰三阿哩伽二合婆誐嚩底四鉢囉二合帝引蹉娑嚩二合引賀引五獻閼伽已行人合掌作是言大菩薩唯願慈悲受此供養行人復以金剛橛印結界除魔以金剛杵為界所結界隨法作用或作大惡法時結此印以右手頭指如鉤拇指如針安於下面此是橛印大明曰唵引尊禰儞一計引攞野娑嚩二合引賀引二結金剛界印不改前印以右手頭指如鉤左手頭指直竪成印於虛空中旋動結金剛界大明曰唵引尊禰引儞一鉢囉二合引迦囉野娑嚩二合引賀引二復次結金剛半惹囉印不改前印以二頭指二中指相捻於頭上動搖成印大明曰唵引尊禰儞一半惹囉娑嚩二合引賀引二次結根本印念根本大明三遍次結大印及誦大明七遍次結三叉印以二手作拳各舒頭指中指無名指如三叉成印大明曰唵引尊娑嚩二合引賀引次結搗杵印以二手作拳以二拇指相交成印大明曰唵引左隸引吽引次結幡印以左手頭指中指各竪立而作動搖成印大明曰唵引尊次結幢印以右手作拳直竪頭指中指成印大明曰唵引尊次誦不動尊心明及金剛曩佉心明加持香花等為潔淨供養不動尊心明曰唵引㰠呼郎切引一吽引癹吒半音二次誦金剛曩佉心明曰唵引𡁠曩𡁠俱半音次結塗香印以右手拇指捏頭指頭展舒餘指結此印及誦明加持塗香奉上本尊及衆賢聖大明曰唵引隸引娑嚩二合引賀引次結花印即不改前印誦大明曰唵引尊娑嚩二合引賀引次結香印以右手拇指捏中指頭節成印誦大明曰唵引隸引娑嚩引二合賀引次結出生印以左手拇指與頭指相捻成印即誦獻食明曰唵引尊娑嚩二合引賀引次結獻燈印以右手拇指捏中指第一節成印大明曰唵引禰引娑嚩二合引賀引如上所說奉獻佛及賢聖諸供養具乃至飲食香花等所有印及大明各隨本部先後次第施設若作息災等法先用塗香等然後結獻供養印或作觀想或內或外一切供養奉上賢聖次結大印以二手各作拳安於心想二掌內各有阿字成印以此印獻諸賢聖次結蓮華印以二手相合八指各相離竪如蓮華相二拇指屈入掌成印結此印獻諸賢聖大明曰唵引左隸引一祖隸引二尊禰引三室哩二合引洛剎彌二合引冒沙吒半音四次結根本印以二手作合掌舒二拇指入掌中成印根本明曰唵引尊怛囉二合引野引阿娑怛囉三合劍一唵引祖底娑普二合囉二阿鉢娑怛囕二合唵引尊賀曩曩引囉贊三次結八輻輪印以二手相倒展舒磔開十指以右手壓左手背成印於頂上動搖誦大明曰唵引尊一鉢囉二合娑普二合囉作訖囕二合二次結羂索印以二手相合以二無名指如鎖成印誦大明曰唵引尊吽引癹吒半音次結鉤印以左手拇指無名指小指頭指屈如鉤成印誦大明曰唵引左隸引一祖隸引二尊禰引紇哩二合引三次結獻廣大供養印以二手合掌十指屈第三節各不相著成印安頂上行人結此印時發不可思議心無我所心無取捨心復觀想世間一切殊妙香花珍寶乃至寶山及大海中寶藏一切之物悉皆現前用獻一切佛及菩薩以此功德回施真如法界復運心以我所作如是供養所獲福力展轉變成無量供養奉獻十方一切如來及諸菩薩大會之衆願佛菩薩不捨大慈攝受供養廣大普供養明曰曩莫薩哩嚩二合一怛他引誐帝引毗踰二合引二尾濕嚩二合目契引毗藥二合三薩哩嚩二合他引四朅五三母捺誐二合帝引六娑頗二合囉呬𤚥七誐誐曩劍娑嚩二合引賀引八
